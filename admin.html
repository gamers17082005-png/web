<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Login</h2>

<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<div id="dashboard" style="display:none;">
  <h2>Orders</h2>
  <div id="orders"></div>
</div>

<script>
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "admin" && p === "1234") {
    document.getElementById("dashboard").style.display = "block";
    loadOrders();
  } else {
    alert("Wrong login");
  }
}

async function loadOrders() {
  const res = await fetch("http://localhost:5000/orders");
  const data = await res.json();

  let html = "";

  data.forEach((o, i) => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <p><b>${o.name}</b> (${o.phone})</p>
        <p>${o.address}, ${o.state}</p>
        <p>Total: ₹${o.total}</p>
        <p>Status: ${o.status}</p>

        <button onclick="update(${i}, 'Shipped')">Ship</button>
        <button onclick="update(${i}, 'Delivered')">Deliver</button>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

async function update(index, status) {
  await fetch("http://localhost:5000/update-status", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ index, status })
  });

  loadOrders();
}
</script>

</body>
</html>
