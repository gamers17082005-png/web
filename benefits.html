<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - HSV Sugandhika</title>

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="../style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #000;
      padding: 15px 40px;
      color: #fff;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      color: #ff7a00;
    }

    /* CONTENT */
    .contact-section {
      padding: 60px 40px;
      text-align: center;
    }

    .contact-section h2 {
      margin-bottom: 20px;
    }

    .contact-box {
      background: #f5f5f5;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .contact-box p {
      margin: 10px 0;
      font-size: 16px;
    }

    .contact-box button {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #25D366;
      border: none;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      background-color: #000;
      color: #fff;
      padding: 20px 40px;
      text-align: center;
      margin-top: 40px;
    }

    footer div {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🪔 HSV Sugandhika</div>

    <nav>
      <a href="../index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="benefits.html">Benefits</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <h2>Contact Us</h2>

    <div class="contact-box">
      <p>📧 Email: support@hsv.com</p>
      <p>📞 Phone: +91 98765 43210</p>

      <button onclick="window.location.href='https://wa.me/919876543210'">
        Order via WhatsApp
      </button>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 HSV Sugandhika | All Rights Reserved</p>
    <div>🌐 📷 💬 📞</div>
  </footer>

</body>
</html>
