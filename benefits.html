<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Benefits - HSV Sugandhika</title>

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="../style.css">

  <!-- PAGE STYLE -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #000;
      padding: 15px 40px;
      color: #fff;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      color: #ff7a00;
    }

    /* TITLE */
    h2 {
      text-align: center;
      margin-top: 40px;
    }

    /* BENEFITS SECTION */
    .benefits {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .benefit-box {
      background: #f5f5f5;
      padding: 20px 30px;
      border-radius: 10px;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* CART SECTION */
    .cart {
      padding: 20px 40px;
    }

    .cart h3 {
      margin-bottom: 10px;
    }

    .cart button {
      padding: 10px 20px;
      background-color: #25D366;
      border: none;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      background-color: #000;
      color: #fff;
      padding: 20px 40px;
      text-align: center;
      margin-top: 40px;
    }

    footer div {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🪔 HSV Sugandhika</div>

    <nav>
      <a href="../index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="benefits.html">Benefits</a>
      <a href="testimonials.html">Testimonials</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- TITLE -->
  <h2>Benefits</h2>

  <!-- BENEFITS -->
  <section class="benefits">
    <div class="benefit-box">🌿 Natural Products</div>
    <div class="benefit-box">🙏 Spiritual Energy</div>
    <div class="benefit-box">🔥 Long Lasting Fragrance</div>
  </section>

  <!-- CART -->
  <section class="cart">
    <h3>Your Cart</h3>
    <button>Checkout via WhatsApp</button>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 HSV Sugandhika | All Rights Reserved</p>
    <div>🌐 📷 💬 📞</div>
  </footer>

</body>
</html>
