<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HSV Sugandhika</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">🛕 HSV Sugandhika</div>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="benefits.html">Benefits</a>
    <a href="testimonials.html">Testimonials</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="nav-actions">
    <button onclick="openCart()">🛒 (<span id="cartCount">0</span>)</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>From Nature’s Heart to Your Sacred Rituals</h1>
  <p>Pure • Natural • Divine</p>
  <a href="products.html" class="btn">Shop Now</a>
</section>

<!-- FEATURED PRODUCTS -->
<section>
  <h2 class="section-title">Featured Products</h2>
  <div id="productList"></div>
</section>

<!-- CART -->
<div id="cartSection" class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <p>Total: ₹<span id="cartTotal">0</span></p>

  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- ADDRESS -->
<div id="addressSection" class="cart">
  <h2>Enter Address</h2>

  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="state" placeholder="State">
  <textarea id="address" placeholder="Address"></textarea>

  <button onclick="placeOrder()">Proceed to Payment</button>
</div>

<script src="script.js"></script>

</body>
</html>
