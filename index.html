<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
</head>

<body>

<h1>Products</h1>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart"></div>

<h2>Address</h2>
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="address" placeholder="Address"><br><br>

<select id="state">
  <option>Andhra Pradesh</option>
  <option>Telangana</option>
  <option>Karnataka</option>
  <option>Tamil Nadu</option>
</select><br><br>

<button onclick="checkout()">Pay Now</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const BASE = "https://your-app.onrender.com"; // CHANGE THIS

let cart = [];

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  let html = "";

  data.forEach((p, i) => {
    html += `
      <div>
        <img src="${p.image}" width="100">
        <p>${p.name} - ₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ADD TO CART
function addToCart(i) {
  fetch(BASE + "/products")
    .then(res => res.json())
    .then(data => {
      cart.push(data[i]);
      updateCart();
    });
}

// UPDATE CART
function updateCart() {
  let html = "";
  let total = 0;

  cart.forEach((item) => {
    total += Number(item.price);
    html += `<p>${item.name} - ₹${item.price}</p>`;
  });

  html += `<h3>Total: ₹${total}</h3>`;

  document.getElementById("cart").innerHTML = html;
}

// CHECKOUT
async function checkout() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const state = document.getElementById("state").value;

  let amount = 0;
  cart.forEach(i => amount += Number(i.price));

  const res = await fetch(BASE + "/create-order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount, state })
  });

  const data = await res.json();

  const options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: data.order.amount,
    currency: "INR",
    order_id: data.order.id,

    handler: async function () {
      await fetch(BASE + "/save-order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name,
          phone,
          address,
          state,
          cart,
          total: data.total
        })
      });

      alert("Order placed!");
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

loadProducts();
</script>

</body>
</html>
