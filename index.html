<!DOCTYPE html>
<html>
<head>
  <title>HSV Sugandhika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    /* NAVBAR */
    .navbar {
      background: #ff7a00;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      background: linear-gradient(to right, #ff7a00, #d4af37);
      color: white;
      padding: 40px;
      text-align: center;
    }

    /* PRODUCTS GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .btn {
      background: #ff7a00;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #e66a00;
    }

    /* CART */
    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 15px;
      overflow-y: auto;
    }

    input, select {
      width: 95%;
      padding: 10px;
      margin: 5px 0;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">HSV Sugandhika</div>
  <div onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Spiritual Essentials</h1>
  <p>From Nature’s Heart 🌿</p>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART PANEL -->
<div class="cart" id="cartPanel" style="display:none;">
  <h2>Your Cart</h2>
  <div id="cart"></div>

  <h3>Delivery Details</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">

  <select id="state">
    <option>Andhra Pradesh</option>
    <option>Telangana</option>
    <option>Karnataka</option>
    <option>Tamil Nadu</option>
    <option>Other</option>
  </select>

  <button class="btn" onclick="checkout()">Pay Now</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const BASE = "https://your-app.onrender.com"; // CHANGE

let cart = [];

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  let html = "";

  data.forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="btn" onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ADD TO CART
async function addToCart(i) {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  cart.push(data[i]);
  updateCart();
}

// UPDATE CART
function updateCart() {
  let html = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += Number(item.price);

    html += `
      <div>
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${i})">❌</button>
      </div>
    `;
  });

  html += `<h3>Total: ₹${total}</h3>`;

  document.getElementById("cart").innerHTML = html;
  document.getElementById("count").innerText = cart.length;
}

// REMOVE ITEM
function removeItem(i) {
  cart.splice(i, 1);
  updateCart();
}

// TOGGLE CART
function toggleCart() {
  const panel = document.getElementById("cartPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// CHECKOUT
async function checkout() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const state = document.getElementById("state").value;

  let amount = 0;
  cart.forEach(i => amount += Number(i.price));

  const res = await fetch(BASE + "/create-order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount, state })
  });

  const data = await res.json();

  const options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: data.order.amount,
    order_id: data.order.id,

    handler: async function () {
      await fetch(BASE + "/save-order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name, phone, address, state, cart, total: data.total
        })
      });

      alert("Order Placed!");
      cart = [];
      updateCart();
    }
  };

  new Razorpay(options).open();
}

loadProducts();
</script>

</body>
</html>
