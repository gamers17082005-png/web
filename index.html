<!DOCTYPE html>
<html>
<head>
  <title>HSV Sugandhika</title>
</head>

<body>

<h1>🛍️ HSV Sugandhika Store</h1>

<!-- PRODUCTS -->
<h2>Products</h2>
<div id="products"></div>

<!-- CART -->
<h2>Cart</h2>
<div id="cart"></div>

<!-- ADDRESS -->
<h2>Delivery Details</h2>
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="address" placeholder="Address"><br><br>

<select id="state">
  <option>Andhra Pradesh</option>
  <option>Telangana</option>
  <option>Karnataka</option>
  <option>Tamil Nadu</option>
  <option>Other</option>
</select><br><br>

<button onclick="checkout()">Proceed to Payment</button>

<hr>

<!-- TRACK ORDER -->
<h2>Track Order</h2>
<input id="trackPhone" placeholder="Enter Phone Number">
<button onclick="trackOrder()">Track</button>

<div id="trackingResult"></div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const BASE = "https://your-app.onrender.com"; // CHANGE THIS

let cart = [];

// ================= LOAD PRODUCTS =================
async function loadProducts() {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  let html = "";

  data.forEach((p, i) => {
    html += `
      <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <img src="${p.image}" width="120"><br>
        <b>${p.name}</b><br>
        ₹${p.price}<br><br>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= ADD TO CART =================
async function addToCart(i) {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  cart.push(data[i]);
  updateCart();
}

// ================= REMOVE FROM CART =================
function removeFromCart(index) {
  cart.splice(index, 1);
  updateCart();
}

// ================= UPDATE CART =================
function updateCart() {
  let html = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += Number(item.price);

    html += `
      <div>
        ${item.name} - ₹${item.price}
        <button onclick="removeFromCart(${i})">❌</button>
      </div>
    `;
  });

  html += `<h3>Total: ₹${total}</h3>`;

  document.getElementById("cart").innerHTML = html;
}

// ================= CHECKOUT =================
async function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const state = document.getElementById("state").value;

  if (!name || !phone || !address) {
    alert("Fill all details");
    return;
  }

  let amount = 0;
  cart.forEach(i => amount += Number(i.price));

  const res = await fetch(BASE + "/create-order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount, state })
  });

  const data = await res.json();

  const options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: data.order.amount,
    currency: "INR",
    order_id: data.order.id,

    handler: async function () {

      await fetch(BASE + "/save-order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name,
          phone,
          address,
          state,
          cart,
          total: data.total
        })
      });

      alert("✅ Order placed successfully!");

      cart = [];
      updateCart();
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

// ================= TRACK ORDER =================
async function trackOrder() {
  const phone = document.getElementById("trackPhone").value;

  const res = await fetch(BASE + "/track-order?phone=" + phone);
  const data = await res.json();

  let html = "";

  if (data.length === 0) {
    html = "No orders found";
  } else {
    data.forEach(o => {
      html += `
        <div style="border:1px solid green; margin:10px; padding:10px;">
          <b>${o.name}</b><br>
          ₹${o.total}<br>
          Status: <b>${o.status}</b>
        </div>
      `;
    });
  }

  document.getElementById("trackingResult").innerHTML = html;
}

loadProducts();
</script>

</body>
</html>
