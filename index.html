<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HSV Sugandhika</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff8f0;
    }

    header {
      background: #8B0000;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: orange;
      border: none;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    #cart-box {
      position: fixed;
      right: 0;
      top: 60px;
      width: 300px;
      background: white;
      border: 1px solid #ccc;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <h2>HSV Sugandhika</h2>
  <div onclick="toggleCart()">🛒 Cart</div>
</header>

<section class="products">

  <div class="product-grid">

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/71dkzBHdZxS._AC_UF1000_QL80_.jpg">
      <h3>Agarbatti</h3>
      <p>₹120</p>
      <button onclick="addToCart('Agarbatti',120)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/61sQ+qAKr-L.jpg">
      <h3>Camphor</h3>
      <p>₹80</p>
      <button onclick="addToCart('Camphor',80)">Add to Cart</button>
    </div>

  </div>

</section>

<!-- CART -->
<div id="cart-box">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <p id="cart-total"></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
